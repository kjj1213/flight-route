<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>기상 악화 시 최적 우회 경로 추천 시스템</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 30px;
}

h1{
    text-align:center;
}

.route{
    margin:10px 0;
}

select{
    padding:5px;
}

button{
    padding:10px 20px;
    margin-top:20px;
    cursor:pointer;
    font-size:16px;
}

#result{
    margin-top:25px;
    font-size:20px;
}

#miniMap{
    position:fixed;
    right:20px;
    bottom:20px;

    width:450px;
    height:350px;

    background:white;

    border:2px solid #333;
    border-radius:10px;

    padding:10px;

    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

#miniMap h3{
    text-align:center;
    margin:0;
}

canvas{
    margin-top:10px;
}

</style>
</head>

<body>

<h1>✈ 기상 악화 시 최적 우회 경로 추천 시스템</h1>

<div class="route">
A → B :
<select id="AB">
<option value="S">맑음 ☀️</option>
<option value="R">비 🌧️</option>
<option value="W">강풍 🌬️</option>
<option value="T">뇌우 ⛈️</option>
</select>
</div>

<div class="route">
A → C :
<select id="AC">
<option value="S">맑음 ☀️</option>
<option value="R">비 🌧️</option>
<option value="W">강풍 🌬️</option>
<option value="T">뇌우 ⛈️</option>
</select>
</div>

<div class="route">
B → D :
<select id="BD">
<option value="S">맑음 ☀️</option>
<option value="R">비 🌧️</option>
<option value="W">강풍 🌬️</option>
<option value="T">뇌우 ⛈️</option>
</select>
</div>

<div class="route">
C → D :
<select id="CD">
<option value="S">맑음 ☀️</option>
<option value="R">비 🌧️</option>
<option value="W">강풍 🌬️</option>
<option value="T">뇌우 ⛈️</option>
</select>
</div>

<div class="route">
D → E :
<select id="DE">
<option value="S">맑음 ☀️</option>
<option value="R">비 🌧️</option>
<option value="W">강풍 🌬️</option>
<option value="T">뇌우 ⛈️</option>
</select>
</div>

<button onclick="findRoute()">
최적 경로 찾기
</button>

<div id="result"></div>

<div id="miniMap">
<h3>추천 항로</h3>
<canvas id="routeCanvas"
width="420"
height="280">
</canvas>
</div>

<script>

// 랜덤 공항 위치

const airports = {

A:{x:50,y:60},

B:{
x:120+Math.random()*80,
y:40+Math.random()*80
},

C:{
x:120+Math.random()*80,
y:170+Math.random()*60
},

D:{
x:260+Math.random()*80,
y:90+Math.random()*100
},

E:{x:380,y:150}

};


// 그래프

const graph = {

A:[['B',100],['C',150]],
B:[['D',120]],
C:[['D',180]],
D:[['E',100]],
E:[]

};


// 위험도

function getRisk(weather){

switch(weather){

case 'S':
return 1;

case 'R':
return 3;

case 'W':
return 5;

case 'T':
return 10;
}

}


// 지도 그리기

function drawMap(weather,path){

const canvas =
document.getElementById(
"routeCanvas"
);

const ctx =
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);


// 날씨 색상

function weatherColor(code){

if(code==="S") return "green";

if(code==="R") return "gold";

if(code==="W") return "orange";

return "red";

}


const routes = [

["A","B"],
["A","C"],
["B","D"],
["C","D"],
["D","E"]

];


// 전체 항로

routes.forEach(route=>{

const from = route[0];
const to = route[1];

const key =
from + "-" + to;

ctx.strokeStyle =
weatherColor(
weather[key]
);

ctx.lineWidth = 3;

ctx.beginPath();

ctx.moveTo(
airports[from].x,
airports[from].y
);

ctx.lineTo(
airports[to].x,
airports[to].y
);

ctx.stroke();

});


// 추천 경로

if(path.length>1){

for(let i=0;
i<path.length-1;
i++){

ctx.strokeStyle =
"blue";

ctx.lineWidth = 7;

ctx.beginPath();

ctx.moveTo(
airports[path[i]].x,
airports[path[i]].y
);

ctx.lineTo(
airports[path[i+1]].x,
airports[path[i+1]].y
);

ctx.stroke();

}

}


// 공항 표시

for(let airport in airports){

ctx.fillStyle =
"black";

ctx.beginPath();

ctx.arc(
airports[airport].x,
airports[airport].y,
10,
0,
Math.PI*2
);

ctx.fill();

ctx.fillText(
airport,
airports[airport].x-3,
airports[airport].y-15
);

}

}



// 최적 경로 탐색

function findRoute(){

const weather = {

"A-B":
document.getElementById("AB").value,

"A-C":
document.getElementById("AC").value,

"B-D":
document.getElementById("BD").value,

"C-D":
document.getElementById("CD").value,

"D-E":
document.getElementById("DE").value

};


const dist = {

A:0,
B:Infinity,
C:Infinity,
D:Infinity,
E:Infinity

};

const prev = {};
const visited = {};


// 다익스트라

while(true){

let current = null;
let min = Infinity;

for(let node in dist){

if(
!visited[node] &&
dist[node] < min
){

min = dist[node];
current = node;

}

}

if(current === null)
break;

visited[current] = true;

for(let [next,distance]
of graph[current]){

const key =
current+"-"+next;

const risk =
getRisk(weather[key]);


// 뇌우 통과 금지

if(risk >= 10)
continue;

const cost =
distance + risk*50;

if(
dist[current]+cost
<
dist[next]
){

dist[next] =
dist[current]
+
cost;

prev[next] =
current;

}

}

}


// 경로 없음

if(dist.E === Infinity){

document
.getElementById("result")
.innerHTML =

"<span style='color:red;'>⚠ 안전한 경로를 찾을 수 없습니다.</span>";

drawMap(
weather,
[]
);

return;

}


// 경로 생성

let path = [];

let node = "E";

while(node){

path.unshift(node);

node = prev[node];

}


// 안전 점수 계산

let totalRisk = 0;

for(let i=0;
i<path.length-1;
i++){

const route =
path[i]
+
"-"
+
path[i+1];

totalRisk +=
getRisk(
weather[route]
);

}


let safetyScore =
Math.max(
0,
100-totalRisk*10
);


let level;
let color;


if(safetyScore >= 80){

level = "매우 안전";
color = "green";

}
else if(safetyScore >= 60){

level = "안전";
color = "blue";

}
else if(safetyScore >= 40){

level = "주의";
color = "orange";

}
else{

level = "위험";
color = "red";

}


document
.getElementById("result")
.innerHTML =

`
<h2>✈ 추천 경로</h2>

${path.join(" → ")}

<br><br>

<h2>🛡 안전 점수</h2>

${safetyScore}점

<br><br>

등급 :
<span style="
color:${color};
font-weight:bold;
font-size:24px;
">
${level}
</span>
`;

drawMap(
weather,
path
);

}


// 최초 지도

drawMap({

"A-B":"S",
"A-C":"S",
"B-D":"S",
"C-D":"S",
"D-E":"S"

},[]);

</script>

</body>
</html>
