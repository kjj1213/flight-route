<button onclick="findRoute()">
최적 경로 찾기
</button>

<div id="miniMap">
<h3>추천 항로</h3>

<canvas id="routeCanvas"
width="430"
height="280"></canvas>

<div id="legend">
🟢 맑음<br>
🟡 비<br>
🟠 강풍<br>
🔴 뇌우<br>
🔵 추천 경로
</div>

</div>

<script>

const airports = {

A:{x:50,y:140},

B:{
x:120+Math.random()*30,
y:60+Math.random()*20
},

C:{
x:120+Math.random()*30,
y:220+Math.random()*20
},

D:{
x:240+Math.random()*30,
y:40+Math.random()*20
},

F:{
x:240+Math.random()*30,
y:140+Math.random()*20
},

G:{
x:240+Math.random()*30,
y:240+Math.random()*20
},

H:{
x:360+Math.random()*30,
y:140+Math.random()*20
},

E:{x:430,y:140}

};

let currentWeather = {};

let currentWeather = {};

const graph = {

A:[
['B',100],
['C',120]
],

B:[
['D',100],
['F',130]
],

C:[
['F',120],
['G',140]
],

D:[
['H',120]
],

F:[
['H',100]
],

G:[
['H',110]
],

H:[
['E',90]
],

E:[]

};

function getRisk(weather){

switch(weather){

case 'S':
return 1;

case 'R':
return 3;

case 'W':
return 5;

case 'T':
return 10;

default:
return 1;

}

}

function weatherColor(code){

if(code==="S") return "limegreen";
if(code==="R") return "gold";
if(code==="W") return "orange";
return "red";

}

function drawMap(weather,path){

const canvas =
document.getElementById(
"routeCanvas"
);

const ctx =
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"#101820";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

const routes = [

["A","B"],
["A","C"],

["B","D"],
["B","F"],

["C","F"],
["C","G"],

["D","H"],
["F","H"],
["G","H"],

["H","E"]

];

routes.forEach(route=>{

const from = route[0];
const to = route[1];

const key =
from + "-" + to;

ctx.strokeStyle =
weatherColor(
weather[key]
);

ctx.lineWidth = 3;

ctx.beginPath();

ctx.moveTo(
airports[from].x,
airports[from].y
);

ctx.lineTo(
airports[to].x,
airports[to].y
);

ctx.stroke();

});

if(path.length > 1){

for(let i=0;
i<path.length-1;
i++){

ctx.strokeStyle =
"deepskyblue";

ctx.lineWidth = 7;

ctx.beginPath();

ctx.moveTo(
airports[path[i]].x,
airports[path[i]].y
);

ctx.lineTo(
airports[path[i+1]].x,
airports[path[i+1]].y
);

ctx.stroke();

}

}

for(let airport in airports){

ctx.fillStyle =
"white";

ctx.beginPath();

ctx.arc(
airports[airport].x,
airports[airport].y,
10,
0,
Math.PI*2
);

ctx.fill();

ctx.fillText(
airport,
airports[airport].x-4,
airports[airport].y-15
);

}

}

function animatePlane(path){

const canvas =
document.getElementById("routeCanvas");

const ctx =
canvas.getContext("2d");

if(path.length < 2) return;

let segment = 0;
let t = 0;

function move(){

drawMap(currentWeather, path);

const from =
airports[path[segment]];

const to =
airports[path[segment+1]];

const x =
from.x + (to.x - from.x) * t;

const y =
from.y + (to.y - from.y) * t;

ctx.font = "24px Arial";
ctx.fillText("✈️", x-12, y+8);

t += 0.02;

if(t >= 1){

t = 0;
segment++;

if(segment >= path.length-1){
return;
}

}

requestAnimationFrame(move);

}

move();

}

function findRoute(){

const start =
document.getElementById("start").value;

const end =
document.getElementById("end").value;

if(start === end){

alert(
"출발지와 도착지가 같습니다."
);

return;

}

const weather = {

"A-B": document.getElementById("AB").value,
"A-C": document.getElementById("AC").value,
"B-D": document.getElementById("BD").value,
"B-F": document.getElementById("BF").value,
"C-F": document.getElementById("CF").value,
"C-G": document.getElementById("CG").value,
"D-H": document.getElementById("DH").value,
"F-H": document.getElementById("FH").value,
"G-H": document.getElementById("GH").value,
"H-E": document.getElementById("HE").value

};

currentWeather = weather;

const dist = {};
const prev = {};
const visited = {};
Object.keys(graph).forEach(node=>{

dist[node] = Infinity;
prev[node] = null;

});

dist[start] = 0;

let avoidedRoutes = [];

while(true){

let current = null;
let min = Infinity;

for(let node in dist){

if(
!visited[node]
&&
dist[node] < min
){

min = dist[node];
current = node;

}

}

if(current === null)
break;

visited[current] = true;

for(let edge of graph[current]){

const next =
edge[0];

const distance =
edge[1];

const routeKey =
current + "-" + next;

const risk =
getRisk(
weather[routeKey]
);

if(risk >= 10){

avoidedRoutes.push(
current +
" → " +
next +
" (뇌우)"
);

continue;

}

const cost =
distance +
risk * 50;

if(
dist[current] + cost
<
dist[next]
){

dist[next] =
dist[current]
+
cost;

prev[next] =
current;

}

}

}

if(dist[end] === Infinity){

document.getElementById(
"result"
).innerHTML =

"<span style='color:red;font-size:22px;'>⚠ 안전한 경로를 찾을 수 없습니다.</span>";

drawMap(
weather,
[]
);

return;

}

let path = [];
let node = end;

while(node){

path.unshift(node);
node = prev[node];

}

let totalRisk = 0;
let totalDistance = 0;

for(let i=0;
i<path.length-1;
i++){

const routeKey =
path[i]
+
"-"
+
path[i+1];

totalRisk +=
getRisk(
weather[routeKey]
);

for(let edge of graph[path[i]]){

if(edge[0] === path[i+1]){

totalDistance +=
edge[1];

}

}

}

const safetyScore =
Math.max(
0,
100 - totalRisk*10
);

let level;
let color;

if(safetyScore >= 80){

level = "매우 안전";
color = "green";

}
else if(safetyScore >= 60){

level = "안전";
color = "blue";

}
else if(safetyScore >= 40){

level = "주의";
color = "orange";

}
else{

level = "위험";
color = "red";

}

const flightTime =
(
totalDistance / 600
).toFixed(2);

document.getElementById(
"result"
).innerHTML =

`
<h2>✈ 추천 경로</h2>
${path.join(" → ")}

<br><br>

<h2>🛡 안전 점수</h2>
${safetyScore}점

<br>

<span style="
color:${color};
font-weight:bold;
font-size:24px;
">
${level}
</span>

<br><br>

<h2>🕒 예상 비행 시간</h2>
${flightTime} 시간

<br><br>

<h2>⚠ 회피한 위험 구간</h2>
${
avoidedRoutes.length
?
avoidedRoutes.join("<br>")
:
"없음"
}
`;

drawMap(
weather,
path
);

animatePlane(path);

}

drawMap(
{
"A-B":"S",
"A-C":"S",
"B-D":"S",
"B-F":"S",
"C-F":"S",
"C-G":"S",
"D-H":"S",
"F-H":"S",
"G-H":"S",
"H-E":"S"
},
[]
);

</script>
